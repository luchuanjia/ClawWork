name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (shared)
        run: pnpm --filter @clawwork/desktop exec tsc -b ../../packages/shared/tsconfig.json

      - name: Type check (desktop)
        run: pnpm --filter @clawwork/desktop exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter @clawwork/desktop test

  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            build_args: "--mac --arm64"
          - os: windows-latest
            platform: win
            build_args: "--win --x64"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm --filter @clawwork/desktop build

      - name: Package (${{ matrix.platform }})
        run: pnpm --filter @clawwork/desktop exec electron-builder ${{ matrix.build_args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
